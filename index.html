<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mosnel Sales Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--wine:#722F37;--gold:#C9A84C;--ink:#1a1a1a;--muted:#7a6b6c;--bg:#f9f5f5;--white:#fff;--border:#e8dede;--green:#15803d;--red:#b91c1c}
html,body{height:100%;width:100%}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);font-size:14px}
#upload-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:2rem;text-align:center;background:linear-gradient(135deg,#fdf5f6,#f9f0e8)}
.brand-hero{font-family:'Cormorant Garamond',serif;font-size:3rem;font-weight:600;color:var(--wine);margin-bottom:2rem}
.drop-zone{border:2px dashed var(--wine);border-radius:20px;padding:3rem;cursor:pointer;background:var(--white);max-width:500px;margin:2rem auto;box-shadow:0 4px 24px rgba(114,47,55,0.08)}
.drop-zone:hover{background:#fdf5f6;transform:translateY(-2px)}
.drop-zone h3{font-family:'Cormorant Garamond',serif;font-size:1.4rem;margin-bottom:8px;color:var(--wine)}
.drop-zone p{font-size:12px;color:var(--muted)}
#fi{display:none}
.progress-wrap{width:360px;margin:2rem auto;display:none;background:white;padding:20px;border-radius:10px}
.progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--wine);width:0%;transition:width 0.3s}
.progress-label{font-size:12px;color:var(--muted);margin-top:8px;text-align:center}
#app-screen{display:none;flex-direction:column;height:100vh}
.topbar{background:var(--wine);color:white;padding:12px 24px;display:flex;justify-content:space-between;align-items:center}
.brand-top{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:600}
.btn-reset{background:rgba(255,255,255,0.2);color:white;border:1px solid rgba(255,255,255,0.3);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600}
.btn-reset:hover{background:rgba(255,255,255,0.3)}
.filterbar{background:white;border-bottom:1px solid var(--border);padding:12px 24px;display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
.filter-group{display:flex;flex-direction:column;gap:4px}
.filter-group label{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--muted)}
.filter-group select,.filter-group input{border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:13px;font-family:'DM Sans',sans-serif}
.btn-generate{background:var(--wine);color:white;border:none;padding:7px 18px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer}
.btn-generate:hover{background:#4a1a20}
.btn-export{background:white;color:var(--wine);border:1.5px solid var(--wine);padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;margin-left:6px}
.btn-export:hover{background:var(--wine);color:white}
.content{flex:1;overflow-y:auto;padding:24px}
#placeholder{text-align:center;color:var(--muted);padding:40px}
#report-wrapper{background:white;border-radius:10px;padding:24px}
.report-header{background:linear-gradient(135deg,var(--wine),#4a1a20);border-radius:12px;padding:20px;margin-bottom:20px;color:white}
.report-header h1{font-family:'Cormorant Garamond',serif;font-size:1.8rem;margin-bottom:6px}
.report-header p{font-size:12px;opacity:0.8}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
@media(max-width:900px){.kpi-row{grid-template-columns:repeat(2,1fr)}}
.kpi-card{background:white;border:1px solid var(--border);border-radius:10px;padding:16px}
.kpi-label{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.kpi-value{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:600;color:var(--wine)}
.kpi-subtitle{font-size:11px;color:var(--muted);margin-top:6px}
.section{margin-bottom:20px}
.section-title{font-size:12px;font-weight:700;text-transform:uppercase;color:var(--wine);margin-bottom:12px;letter-spacing:1px}
.table-wrapper{overflow-x:auto;border:1px solid var(--border);border-radius:8px}
table{width:100%;border-collapse:collapse}
thead{background:#faf7f7}
th{padding:12px 14px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;color:var(--muted);border-bottom:2px solid var(--border);cursor:pointer;user-select:none}
th:hover{color:var(--wine)}
td{padding:10px 14px;border-bottom:1px solid var(--border)}
tr:hover{background:#faf7f7}
.text-right{text-align:right;font-weight:600}
.text-green{color:var(--green)}
.text-red{color:var(--red)}
.badge{display:inline-block;padding:4px 10px;border-radius:12px;font-size:11px;font-weight:600}
.badge-up{background:#dcfce7;color:var(--green)}
.badge-down{background:#fee2e2;color:var(--red)}
.badge-neutral{background:#fef3c7;color:#92400e}
</style>
</head>
<body>

<div id="upload-screen">
  <div class="brand-hero">Mosnel</div>
  <div class="drop-zone" onclick="document.getElementById('fi').click()">
    <h3>Carica file vendite</h3>
    <p>Seleziona il file Excel dal gestionale Maxi Data Uve</p>
    <p style="font-size:10px;color:var(--muted);margin-top:12px">Ricorda: elimina le righe 35698 e 35702 prima di caricare</p>
  </div>
  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="progress-label" id="progress-label">Lettura file...</div>
  </div>
  <input type="file" id="fi" accept=".xlsx,.xls">
</div>

<div id="app-screen">
  <div class="topbar">
    <div class="brand-top">Mosnel <span>Sales Intelligence</span></div>
    <button class="btn-reset" onclick="resetApp()">Nuovo file</button>
  </div>
  <div class="filterbar">
    <div class="filter-group">
      <label>Vista</label>
      <select id="vista">
        <option value="ITALIA">Italia — Totale</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Anno</label>
      <select id="anno">
        <option value="2026">2026</option>
        <option value="2025">2025</option>
      </select>
    </div>
    <button class="btn-generate" onclick="generaReport()">Genera Report</button>
    <button class="btn-export" id="btn-export-excel" onclick="exportExcel()" style="display:none">Export Excel</button>
  </div>
  <div class="content">
    <div id="placeholder">Seleziona i parametri e clicca "Genera Report"</div>
    <div id="report-wrapper" style="display:none"></div>
  </div>
</div>

<script>
let D=[];
let lastReport=null;

const EUR=function(n){return new Intl.NumberFormat('it-IT',{style:'currency',currency:'EUR',minimumFractionDigits:0}).format(n)};
const NUM=function(n){return new Intl.NumberFormat('it-IT',{minimumFractionDigits:0}).format(Math.round(n))};
const PCT=function(n,d){return(d?n.toFixed(d):Math.round(n))+'%'};

document.getElementById('fi').addEventListener('change',function(e){
  const file=e.target.files[0];
  if(!file)return;
  
  document.getElementById('progress-wrap').style.display='block';
  document.getElementById('progress-fill').style.width='20%';
  document.getElementById('progress-label').textContent='Lettura file: '+file.name;
  
  const reader=new FileReader();
  reader.onload=function(ev){
    setTimeout(function(){
      try{
        document.getElementById('progress-label').textContent='Pulizia dati...';
        document.getElementById('progress-fill').style.width='60%';
        
        const wb=XLSX.read(ev.target.result,{type:'binary'});
        const rawData=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
        
        D=cleanData(rawData);
        
        document.getElementById('progress-fill').style.width='100%';
        document.getElementById('progress-label').textContent='✓ '+D.length.toLocaleString('it-IT')+' righe caricate';
        
        setTimeout(function(){
          document.getElementById('upload-screen').style.display='none';
          document.getElementById('app-screen').style.display='flex';
          fillViste();
          document.getElementById('progress-wrap').style.display='none';
        },800);
      }catch(err){
        document.getElementById('progress-label').textContent='Errore: '+err.message;
        console.error(err);
      }
    },200);
  };
  reader.onerror=function(){
    document.getElementById('progress-label').textContent='Errore lettura file';
  };
  reader.readAsBinaryString(file);
});

function cleanData(raw){
  const excludeAgents=['PV','AUTOCONSUMO','VUOTO','WINE CLUB'];
  const excludeCategories=['SCONTRINO','AUTOCONSUMO'];
  
  return raw.filter(function(r){
    if(excludeAgents.includes((r.Nome_Agente||'').trim()))return false;
    if(excludeCategories.includes((r.Descr_Cat_Cli||'').trim()))return false;
    const stato=(r.Stato||'').trim();
    if(stato&&stato!=='_Italia')return false;
    const anno=parseInt(r.Anno);
    if(![2025,2026].includes(anno))return false;
    return true;
  }).map(function(r){
    let mese=0;
    const d=r.Data_Doc;
    if(d instanceof Date){mese=d.getMonth()+1;}
    else if(typeof d==='string'){const p=new Date(d);if(!isNaN(p.getTime())){mese=p.getMonth()+1;}}
    else if(typeof d==='number'){const b=new Date(1899,11,30);b.setDate(b.getDate()+Math.floor(d));mese=b.getMonth()+1;}
    
    return{
      anno:parseInt(r.Anno),
      mese:mese,
      agente:(r.Nome_Agente||'').trim(),
      cliente:(r.Ragione_Sociale||'').trim(),
      pezzi:parseFloat(r.Qta_Pezzi)||0,
      importo:parseFloat(r.Importo_Netto)||0,
      tipoRiga:['N.Acc.','F.Acc.'].includes((r.Tipo_Doc||'').trim())?'Accredito':'Vendita',
      tipologia:(r.Descr_Merceologica||'').trim(),
      articolo:(r.Descr_Articolo||'').trim()
    };
  });
}

function fillViste(){
  const agenti=[...new Set(D.map(function(r){return r.agente}))].filter(Boolean).sort();
  const select=document.getElementById('vista');
  select.innerHTML='<option value="ITALIA">Italia — Totale</option>';
  agenti.forEach(function(a){
    const opt=document.createElement('option');
    opt.value=a;
    opt.textContent=a;
    select.appendChild(opt);
  });
}

function generaReport(){
  const vista=document.getElementById('vista').value;
  const anno=parseInt(document.getElementById('anno').value);
  const annoP=anno-1;
  
  const dati=vista==='ITALIA'?D:D.filter(function(r){return r.agente===vista});
  const vend=dati.filter(function(r){return r.anno===anno&&r.tipoRiga==='Vendita'});
  const vendP=dati.filter(function(r){return r.anno===annoP&&r.tipoRiga==='Vendita'});
  
  const f26=vend.reduce(function(s,r){return s+r.importo},0);
  const f25=vendP.reduce(function(s,r){return s+r.importo},0);
  const b26=vend.reduce(function(s,r){return s+r.pezzi},0);
  const b25=vendP.reduce(function(s,r){return s+r.pezzi},0);
  
  const dF=f25>0?((f26-f25)/f25)*100:0;
  const dB=b25>0?((b26-b25)/b25)*100:0;
  
  const mCli26={};
  const mCli25={};
  const mBt26={};
  const mBt25={};
  
  vend.forEach(function(r){
    if(!mCli26[r.cliente])mCli26[r.cliente]=0;
    mCli26[r.cliente]+=r.importo;
    if(!mBt26[r.cliente])mBt26[r.cliente]=0;
    mBt26[r.cliente]+=r.pezzi;
  });
  
  vendP.forEach(function(r){
    if(!mCli25[r.cliente])mCli25[r.cliente]=0;
    mCli25[r.cliente]+=r.importo;
    if(!mBt25[r.cliente])mBt25[r.cliente]=0;
    mBt25[r.cliente]+=r.pezzi;
  });
  
  const clienti=Object.keys(mCli26).map(function(c){
    const v26=mCli26[c];
    const v25=mCli25[c]||0;
    const varVal=v26-v25;
    const varPct=v25>0?((v26-v25)/v25)*100:0;
    return{
      nome:c,
      v26:v26,
      v25:v25,
      var:varVal,
      varPct:varPct,
      b26:mBt26[c]||0,
      b25:mBt25[c]||0
    };
  }).sort(function(a,b){return b.v26-a.v26});
  
  lastReport={vista:vista,anno:anno,annoP:annoP,f26:f26,f25:f25,b26:b26,b25:b25,clienti:clienti};
  
  let html='';
  html+='<div class="report-header"><h1>'+vista+'</h1><p>'+anno+' vs '+annoP+' — YTD stesso periodo</p></div>';
  
  html+='<div class="kpi-row">';
  html+='<div class="kpi-card"><div class="kpi-label">Fatturato '+anno+'</div><div class="kpi-value">'+EUR(f26)+'</div><div class="kpi-subtitle">'+(dF>0?'<span class="badge badge-up">+':dF<0?'<span class="badge badge-down">':'')+PCT(dF,1)+'</span></div></div>';
  html+='<div class="kpi-card"><div class="kpi-label">Bottiglie '+anno+'</div><div class="kpi-value">'+NUM(b26)+'</div><div class="kpi-subtitle">'+anno+' vs '+annoP+'</div></div>';
  html+='<div class="kpi-card"><div class="kpi-label">Variazione €</div><div class="kpi-value text-'+(f26-f25>=0?'green':'red')+'">'+EUR(f26-f25)+'</div><div class="kpi-subtitle">'+NUM(vend.length)+' ordini</div></div>';
  html+='<div class="kpi-card"><div class="kpi-label">Clienti attivi</div><div class="kpi-value">'+clienti.length+'</div><div class="kpi-subtitle">'+annoP+': '+Object.keys(mCli25).length+'</div></div>';
  html+='</div>';
  
  html+='<div class="section"><div class="section-title">Riepilogo clienti</div><div class="table-wrapper"><table><thead><tr><th>Cliente</th><th class="text-right">'+anno+'</th><th class="text-right">'+annoP+'</th><th class="text-right">Var €</th><th class="text-right">Var %</th></tr></thead><tbody>';
  
  clienti.forEach(function(c){
    const varColor=c.var>=0?'text-green':'text-red';
    html+='<tr><td>'+c.nome+'</td><td class="text-right">'+EUR(c.v26)+'</td><td class="text-right">'+EUR(c.v25)+'</td><td class="text-right '+varColor+'">'+EUR(c.var)+'</td><td class="text-right '+varColor+'">'+PCT(c.varPct,1)+'</td></tr>';
  });
  
  html+='</tbody></table></div></div>';
  
  document.getElementById('report-wrapper').innerHTML=html;
  document.getElementById('report-wrapper').style.display='block';
  document.getElementById('placeholder').style.display='none';
  document.getElementById('btn-export-excel').style.display='inline-block';
}

function exportExcel(){
  if(!lastReport){alert('Genera un report prima');return;}
  
  const r=lastReport;
  const wb=XLSX.utils.book_new();
  const headers=['Cliente',r.anno.toString(),r.annoP.toString(),'Var €','Var %'];
  const rows=r.clienti.map(function(c){
    return[c.nome,c.v26,c.v25,c.var,c.varPct.toFixed(1)];
  });
  
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([headers].concat(rows)),'Clienti');
  
  try{
    XLSX.writeFile(wb,'Mosnel_'+r.vista+'_'+r.anno+'.xlsx');
  }catch(e){
    const o=XLSX.write(wb,{bookType:'xlsx',type:'binary'});
    const buf=new ArrayBuffer(o.length);
    const v=new Uint8Array(buf);
    for(let i=0;i<o.length;i++)v[i]=o.charCodeAt(i)&0xFF;
    const blob=new Blob([buf],{type:'application/octet-stream'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='Mosnel_'+r.vista+'_'+r.anno+'.xlsx';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }
}

function resetApp(){
  D=[];
  lastReport=null;
  document.getElementById('upload-screen').style.display='flex';
  document.getElementById('app-screen').style.display='none';
  document.getElementById('fi').value='';
  document.getElementById('report-wrapper').innerHTML='';
  document.getElementById('report-wrapper').style.display='none';
  document.getElementById('placeholder').style.display='block';
  document.getElementById('btn-export-excel').style.display='none';
  document.getElementById('progress-wrap').style.display='none';
}
</script>

</body>
</html>
