  var kpi = [
    ['Fatturato ' + r.anno, EUR(r.d26.fatturato), EUR(r.d25.fatturato), EURsign(r.d26.fatturato-r.d25.fatturato), PCTsign(dF)],
    ['Bott. eq. 0,75L ' + r.anno, NUM(r.d26.bottiglieEq), NUM(r.d25.bottiglieEq), NUMsign(r.d26.bottiglieEq-r.d25.bottiglieEq), PCTsign(dB)],
    ['Bottiglie effettive ' + r.anno, NUM(r.d26.bottiglie), NUM(r.d25.bottiglie), NUMsign(r.d26.bottiglie-r.d25.bottiglie), ''],
    ['Prezzo Medio (0,75L)', EUR(r.d26.pm), EUR(r.d25.pm), EURsign(r.d26.pm-r.d25.pm), PCTsign(dPM)],
    ['Ordini ' + r.anno, NUM(r.d26.ordini), NUM(r.d25.ordini), NUMsign(r.d26.ordini-r.d25.ordini), '']
  ];
  doc.autoTable({
    head: [['', r.anno.toString(), r.annoP.toString(), 'Var', 'Var %']],
    body: kpi, startY: y,
    theme: 'striped',
    headStyles: { fillColor: [114, 47, 55], textColor: 255, fontSize: 9 },
    bodyStyles: { fontSize: 10 },
    columnStyles: { 0: { fontStyle: 'bold' }, 1: { halign: 'right' }, 2: { halign: 'right' }, 3: { halign: 'right' }, 4: { halign: 'right' } },
    margin: { left: margin, right: margin }
  });
  y = doc.lastAutoTable.finalY + 8;
  
  // Grafico — converto SVG in immagine canvas e lo aggiungo al PDF
  var svgEl = document.querySelector('.chart-wrap svg');
  if (svgEl) {
    var chartTitle = 'Andamento mensile fatturato';
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(11);
    doc.setTextColor(114, 47, 55);
    doc.text(chartTitle, margin, y);
    y += 4;
    try {
      var svgData = new XMLSerializer().serializeToString(svgEl);
      var canvas = document.createElement('canvas');
      canvas.width = 1200;
      canvas.height = 380;
      var ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      var img = new Image();
      var svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
      var url = URL.createObjectURL(svgBlob);
      img.onload = function() {
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        URL.revokeObjectURL(url);
        var imgData = canvas.toDataURL('image/png');
        doc.addImage(imgData, 'PNG', margin, y, pageW - 2*margin, 60);
        var yAfterChart = y + 64;
        addBlocksAndRefsToPdf(doc, r, yAfterChart);
      };
      img.onerror = function() {
        URL.revokeObjectURL(url);
        addBlocksAndRefsToPdf(doc, r, y);
      };
      img.src = url;
    } catch (e) {
      console.warn('Errore grafico PDF:', e);
      addBlocksAndRefsToPdf(doc, r, y);
    }
  } else {
    addBlocksAndRefsToPdf(doc, r, y);
  }
}

function addBlocksAndRefsToPdf(doc, r, y) {
  var pageW = 210, pageH = 297, margin = 14;
  
  // 4 blocchi riepilogo
  if (y > 230) { doc.addPage(); y = 20; }
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(11);
  doc.setTextColor(114, 47, 55);
  doc.text('Riepilogo clienti', margin, y);
  y += 4;
  
  var totDeltaTutti = 0, totDeltaAttivi = 0, totDeltaCalo = 0, totDeltaAssenti = 0;
  for (var i = 0; i < r.tutti.length; i++) totDeltaTutti += (r.tutti[i].f26 - r.tutti[i].f25);
  for (var i = 0; i < r.attivi.length; i++) totDeltaAttivi += (r.attivi[i].f26 - r.attivi[i].f25);
  for (var i = 0; i < r.calo.length; i++) totDeltaCalo += (r.calo[i].f26 - r.calo[i].f25);
  for (var i = 0; i < r.assenti.length; i++) totDeltaAssenti += (r.assenti[i].f26 - r.assenti[i].f25);
  
  var entityLbl = r.isItalia ? 'agenti' : 'clienti';
  var entityCap = r.isItalia ? 'Agenti' : 'Clienti';
  
  var blocks = [
    ['Tutti i ' + entityLbl, r.tutti.length, totDeltaTutti],
    [entityCap + ' attivi', r.attivi.length, totDeltaAttivi],
    [entityCap + ' in calo', r.calo.length, totDeltaCalo],
    ['Non ancora attivi', r.assenti.length, totDeltaAssenti]
  ];
  doc.autoTable({
    head: [['Categoria', 'N. ' + entityCap, 'Var € totale']],
    body: blocks.map(function(b) { return [b[0], b[1], EURsign(b[2])]; }),
    startY: y,
    theme: 'striped',
    headStyles: { fillColor: [114, 47, 55], textColor: 255, fontSize: 9 },
    bodyStyles: { fontSize: 10 },
    columnStyles: { 0: { fontStyle: 'bold' }, 1: { halign: 'right' }, 2: { halign: 'right' } },
    margin: { left: margin, right: margin }
  });
  y = doc.lastAutoTable.finalY + 8;
  
  // Rotazione referenze — usa btlEq
  if (y > 230) { doc.addPage(); y = 20; }
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(11);
  doc.setTextColor(114, 47, 55);
  doc.text('Rotazione referenze ' + r.anno, margin, y);
  y += 4;
  
  var refRows = [];
  var refNames = REFERENZE.map(function(x) { return x.name; });
  refNames.push('Altro');
  for (var i = 0; i < refNames.length; i++) {
    var name = refNames[i];
    var r26ref = r.refs26[name] || { fatt: 0, btl: 0, btlEq: 0 };
    var r25ref = r.refs25[name] || { fatt: 0, btl: 0, btlEq: 0 };
    if (r26ref.btlEq === 0 && r25ref.btlEq === 0) continue;
    var dRef = r25ref.btlEq > 0 ? ((r26ref.btlEq - r25ref.btlEq) / r25ref.btlEq) * 100 : 0;
    var pctTot = r.d26.bottiglieEq > 0 ? (r26ref.btlEq / r.d26.bottiglieEq) * 100 : 0;
    refRows.push([name, NUM(r26ref.btlEq), EUR(r26ref.fatt), pctTot.toFixed(2).replace('.', ',') + '%', PCTsign(dRef)]);
  }
  doc.autoTable({
    head: [['Referenza', 'Bott. eq. ' + r.anno, 'Fatturato', '% sul totale', 'Var % vs ' + r.annoP]],
    body: refRows, startY: y,
    theme: 'striped',
    headStyles: { fillColor: [114, 47, 55], textColor: 255, fontSize: 9 },
    bodyStyles: { fontSize: 9 },
    columnStyles: { 0: { fontStyle: 'bold' }, 1: { halign: 'right' }, 2: { halign: 'right' }, 3: { halign: 'right' }, 4: { halign: 'right' } },
    margin: { left: margin, right: margin }
  });
  
  // Tabella in pagina aggiuntiva — usa ordine DOM e supporta Italia/Agente
  var orderedTutti = readTableOrder('main-tbl', r.tutti);
  if (orderedTutti.length > 0) {
    doc.addPage('a4', 'landscape');
    var pW = 297;
    doc.setFillColor(114, 47, 55);
    doc.rect(0, 0, pW, 18, 'F');
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(13);
    doc.setTextColor(255, 255, 255);
    doc.text('Elenco ' + entityLbl + ' — ' + r.vista, margin, 11);
    
    var totF26 = 0, totF25 = 0, totB26Eq = 0, totB25Eq = 0;
    var body = [];
    for (var i = 0; i < orderedTutti.length; i++) {
      var c = orderedTutti[i];
      var varP = c.f25 > 0 ? ((c.f26 - c.f25) / c.f25) * 100 : (c.f26 > 0 ? 100 : -100);
      if (r.isItalia) {
        body.push([c.nome, c.nClienti26 || 0, EUR(c.f26), EUR(c.f25), EURsign(c.f26-c.f25), PCTsign(varP), NUM(c.b26Eq || 0), NUM(c.b25Eq || 0), EUR(c.pm26)]);
      } else {
        body.push([c.nome, c.citta || '', c.agente, EUR(c.f26), EUR(c.f25), EURsign(c.f26-c.f25), PCTsign(varP), NUM(c.b26Eq || 0), NUM(c.b25Eq || 0), EUR(c.pm26)]);
      }
      totF26 += c.f26; totF25 += c.f25;
      totB26Eq += c.b26Eq || 0; totB25Eq += c.b25Eq || 0;
    }
    var totPM = PM(totF26, totB26Eq);
    var totDF = totF25 > 0 ? ((totF26 - totF25) / totF25) * 100 : 0;
    if (r.isItalia) {
      body.push(['TOTALE', '', EUR(totF26), EUR(totF25), EURsign(totF26-totF25), PCTsign(totDF), NUM(totB26Eq), NUM(totB25Eq), EUR(totPM)]);
    } else {
      body.push(['TOTALE', '', '', EUR(totF26), EUR(totF25), EURsign(totF26-totF25), PCTsign(totDF), NUM(totB26Eq), NUM(totB25Eq), EUR(totPM)]);
    }
    
    var heads = r.isItalia
      ? [['Agente', 'Clienti 26', 'Fatt. 2026', 'Fatt. 2025', 'Var €', 'Var %', 'Bott. eq. 26', 'Bott. eq. 25', 'PM 26']]
      : [['Cliente', 'Città', 'Agente', 'Fatt. 2026', 'Fatt. 2025', 'Var €', 'Var %', 'Bott. eq. 26', 'Bott. eq. 25', 'PM 26']];
    
    var colStyles = r.isItalia
      ? { 1: { halign: 'right' }, 2: { halign: 'right' }, 3: { halign: 'right' }, 4: { halign: 'right' }, 5: { halign: 'right' }, 6: { halign: 'right' }, 7: { halign: 'right' }, 8: { halign: 'right' } }
      : { 3: { halign: 'right' }, 4: { halign: 'right' }, 5: { halign: 'right' }, 6: { halign: 'right' }, 7: { halign: 'right' }, 8: { halign: 'right' }, 9: { halign: 'right' } };
    
    doc.autoTable({
      head: heads, body: body, startY: 22,
      theme: 'striped',
      headStyles: { fillColor: [114, 47, 55], textColor: 255, fontSize: 8 },
      bodyStyles: { fontSize: 7 },
      columnStyles: colStyles,
      styles: { cellPadding: 1.5 },
      margin: { left: margin, right: margin },
      didParseCell: function(data) {
        if (data.section === 'body' && data.row.index === body.length - 1) {
          data.cell.styles.fontStyle = 'bold';
          data.cell.styles.fillColor = [240, 230, 230];
        }
      }
    });
  }
  
  // Footer
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8);
  doc.setTextColor(150);
  doc.text('Mosnel Sales Intelligence · generato ' + new Date().toLocaleDateString('it-IT'), margin, pageH - 8);
  
  doc.save('Mosnel_Report_' + r.vista + '.pdf');
}

function saveXlsx(wb, name) {
  try { XLSX.writeFile(wb, name); }
  catch (e) {
    var o = XLSX.write(wb, {bookType:'xlsx', type:'binary'});
    var buf = new ArrayBuffer(o.length);
    var v = new Uint8Array(buf);
    for (var i = 0; i < o.length; i++) v[i] = o.charCodeAt(i) & 0xFF;
    var blob = new Blob([buf], {type:'application/octet-stream'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = name;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }
}

function resetApp() {
  D = []; lastReport = null; fvStack = [];
  document.getElementById('upload-screen').style.display = 'flex';
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('fi').value = '';
  document.getElementById('report-wrapper').innerHTML = '';
  document.getElementById('report-wrapper').style.display = 'none';
  document.getElementById('placeholder').style.display = 'block';
  document.getElementById('progress-wrap').style.display = 'none';
  document.getElementById('fv').classList.remove('open');
  clearSearch();
}
